<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="rg1" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#050a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg2" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg3" cx="60%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#166534" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050a1a" stop-opacity="0"/>
