    <circle cx="340" cy="80" r="1"/>
    <circle cx="580" cy="310" r="1.5"/>
    <circle cx="720" cy="160" r="1"/>
    <circle cx="890" cy="440" r="1.5"/>
    <circle cx="1050" cy="90" r="1"/>
